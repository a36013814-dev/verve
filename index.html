        <div class="flex items-center space-x-2">

        </div>
        <span id="unlockBadge" class="bg-slate-100 text-slate-500 font-bold text-[10px] px-2.5 py-1 rounded-full uppercase tracking-wider flex items-center gap-1">
            <i class="fa-solid fa-lock text-[9px]"></i> Locked
        </span>
    </div>

    <div class="space-y-4">
        <div class="flex justify-center py-2 relative">
            <div id="premiumCard" class="w-64 h-[400px] rounded-[24px] p-5 flex flex-col justify-between relative shadow-2xl overflow-hidden border border-white/5 text-slate-100 bg-gradient-to-br from-[#1C1F22] to-[#0F1112] transition-all">
                
                <div class="absolute inset-0 opacity-10 bg-[linear-gradient(45deg,#000_25%,transparent_25%,transparent_50%,#000_50%,#000_75%,transparent_75%,transparent)] bg-[size:10px_10px]"></div>
                
                <div class="absolute -right-12 -top-12 w-40 h-40 rounded-full bg-sporty-accent/20 blur-2xl"></div>
                <div class="absolute -left-12 -bottom-12 w-40 h-40 rounded-full bg-sporty-primary/20 blur-2xl"></div>

                <div class="z-10 flex justify-between items-start">
                    <div>
                        <div class="font-eng font-black text-[10px] tracking-widest text-sporty-accent uppercase leading-none">VERVE PT</div>
                        <div class="text-[8px] font-medium text-sporty-muted tracking-wider mt-0.5 uppercase font-eng">FOREVER STRONG EDITION</div>
                    </div>
                    <div class="w-8 h-6 bg-gradient-to-br from-slate-500 to-slate-700 rounded-md border border-white/10 flex flex-col justify-between p-1 opacity-80 shadow-inner">
                        <div class="w-full h-[1px] bg-white/20"></div>
                        <div class="w-full h-[1px] bg-white/20"></div>
                    </div>
                </div>

                <div class="z-10 flex flex-col items-center justify-center my-auto">
                    <div class="font-eng font-black text-6xl text-transparent bg-clip-text bg-gradient-to-b from-white via-slate-100 to-slate-400 tracking-tighter leading-none shadow-sm">30</div>
                    <div class="font-eng font-black text-[9px] tracking-[0.2em] text-sporty-accent uppercase mt-1">DAYS COMPLETE</div>
                    <div class="w-5 h-[2px] bg-sporty-primary mt-2.5 rounded-full"></div>
                    <p class="text-[11px] font-bold text-slate-300 mt-2 tracking-tight">지치지 않는 강력한 몸의 완성</p>
                </div>

                <div class="z-10 flex justify-between items-end border-t border-white/5 pt-3">
                    <div class="text-left">
                        <div id="premiumInstaTag" class="font-eng font-black text-xs text-white tracking-wide">@verve_dk</div>
                        <div class="text-[7px] font-bold text-sporty-muted uppercase tracking-widest mt-0.5 font-eng">MASTER CERTIFICATE</div>
                    </div>
                    
                    <div class="flex flex-col items-center">
                        <div class="flex -space-x-2.5">
                            <div class="w-7 h-7 rounded-full bg-gradient-to-br from-[#FF5A36] to-[#FF3B30] opacity-90 shadow-lg shadow-sporty-accent/30"></div>
                            <div class="w-7 h-7 rounded-full bg-gradient-to-br from-[#FFCC00] to-[#FF9500] opacity-85 mix-blend-screen"></div>
                        </div>
                        <span class="font-eng font-medium text-[8px] tracking-tight text-white/50 mt-1">mastercard</span>
                    </div>

            </div>

            <div id="lockOverlay" class="absolute inset-0 bg-black/95 backdrop-blur-sm rounded-3xl flex flex-col items-center justify-center p-6 text-center transition-all duration-300 z-20">
                <div class="w-12 h-12 rounded-full bg-[#1A1F1F] border border-sporty-accent/40 flex items-center justify-center shadow-lg text-sporty-accent mb-3 animate-pulse">
                    <i class="fa-solid fa-lock text-base"></i>
                </div>
                <h4 class="text-slate-200 text-sm font-black tracking-tight mb-1">30일 마스터 완료 카드 잠김</h4>
                <p class="text-slate-400 text-[11px] leading-relaxed mb-4">주 4일 운동(16회) 및 매일 단백질(30일)을<br>모두 채우면 영광스러운 피날레 카드가 해금됩니다.</p>
                <div class="w-full max-w-[200px] bg-slate-800/80 rounded-full h-2 mb-4 overflow-hidden p-[1px] border border-slate-700">
                    <div id="lockProgressBar" class="bg-gradient-to-r from-sporty-primary to-sporty-accent h-full rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <div class="flex gap-2">
                    <button type="button" onclick="togglePreview()" class="text-[10px] font-bold bg-slate-800 border border-slate-700 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg transition-all">
                        <span id="previewBtnText">디자인 미리보기</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="flex gap-2">
            <button id="premiumDownloadBtn" type="button" onclick="downloadPremiumCard()" disabled class="w-full bg-slate-800 text-slate-500 border border-slate-700 font-bold py-4 px-4 rounded-xl shadow-md transition-all text-sm flex items-center justify-center space-x-2 cursor-not-allowed">
                <i class="fa-solid fa-circle-check text-xs"></i>
                <span>피날레 마스터 카드 다운로드</span>
            </button>
        </div>
    </div>
</section>
<script>
    let isPreviewActive = false; 

    /**
     * 1. 실시간 완주 여부 검증 및 버튼 잠금 제어 함수
     */
    function updatePremiumLockStatus() {
        const workoutCount = typeof workoutState !== 'undefined' ? workoutState.filter(Boolean).length : 0;
        const proteinCount = typeof proteinState !== 'undefined' ? proteinState.filter(Boolean).length : 0;
        
        // 정직하게 둘 다 만점(16회 완료 및 30일 완료)을 받았을 때만 해금 조건 충족
        const isFullyCompleted = (workoutCount === 16 && proteinCount === 30);
        
        const totalRequired = 16 + 30;
        const currentPoints = workoutCount + proteinCount;
        const completionRate = Math.round((currentPoints / totalRequired) * 100);

        const lockOverlay = document.getElementById('lockOverlay');
        const lockProgressBar = document.getElementById('lockProgressBar');
        const unlockBadge = document.getElementById('unlockBadge');
        const premiumDownloadBtn = document.getElementById('premiumDownloadBtn');
        const previewBtnText = document.getElementById('previewBtnText');

        if (!lockOverlay || !premiumDownloadBtn) return;

        if (lockProgressBar) {
            lockProgressBar.style.width = `${completionRate}%`;
        }

        if (isFullyCompleted) {
            // [완전 해금 조건 충족 시]
            lockOverlay.style.display = 'none';
            if (unlockBadge) {
                unlockBadge.className = "bg-amber-100 text-[#D4AF37] font-bold text-[10px] px-2.5 py-1 rounded-full uppercase tracking-wider flex items-center gap-1 border border-[#D4AF37]/20";
                unlockBadge.innerHTML = `<i class="fa-solid fa-crown text-[9px]"></i> Unlocked`;
            }
            
            // 다운로드 활성화 및 스포티 프리미엄 그라데이션 스타일 활성화
            premiumDownloadBtn.disabled = false;
            premiumDownloadBtn.className = "w-full bg-gradient-to-r from-sporty-primary to-sporty-accent text-white font-extrabold py-4 px-4 rounded-xl shadow-lg shadow-sporty-accent/20 hover:opacity-95 transition-all text-sm flex items-center justify-center space-x-2 cursor-pointer";
        } else {
            // [조건 미달성 시]
            if (unlockBadge) {
                unlockBadge.className = "bg-slate-100 text-slate-500 font-bold text-[10px] px-2.5 py-1 rounded-full uppercase tracking-wider flex items-center gap-1";
                unlockBadge.innerHTML = `<i class="fa-solid fa-lock text-[9px]"></i> Locked (${completionRate}%)`;
            }
            
            // 미리보기가 켜진 게 아니라면 무조건 가림막 노출
            if (!isPreviewActive) {
                lockOverlay.style.display = 'flex';
                if (previewBtnText) previewBtnText.innerText = "디자인 미리보기";
            }

            // 🚨 철벽 방어: 조건 미달성 상태라면 미리보기가 활성화되어 있어도 버튼은 무조건 락(disabled) 고정
            premiumDownloadBtn.disabled = true;
            premiumDownloadBtn.className = "w-full bg-slate-800 text-slate-500 border border-slate-700 font-bold py-4 px-4 rounded-xl shadow-md transition-all text-sm flex items-center justify-center space-x-2 cursor-not-allowed";
        }
    }

    /**
     * 2. 디자인 미리보기 토글 함수
     */
    function togglePreview() {
        const workoutCount = typeof workoutState !== 'undefined' ? workoutState.filter(Boolean).length : 0;
        const proteinCount = typeof proteinState !== 'undefined' ? proteinState.filter(Boolean).length : 0;
        if (workoutCount === 16 && proteinCount === 30) return; // 이미 해금된 상태면 동작 안 함

        const lockOverlay = document.getElementById('lockOverlay');
        const previewBtnText = document.getElementById('previewBtnText');

        isPreviewActive = !isPreviewActive;

        if (isPreviewActive) {
            if (lockOverlay) lockOverlay.style.display = 'none'; // 오버레이 스킨만 걷어냄
            if (previewBtnText) previewBtnText.innerText = "다시 잠그기";
        } else {
            if (lockOverlay) lockOverlay.style.display = 'flex';
            if (previewBtnText) previewBtnText.innerText = "디자인 미리보기";
        }

        // 오버레이가 토글될 때 버튼이 풀리지 않도록 즉시 잠금 상태 강제 업데이트
        updatePremiumLockStatus();
    }

    /**
     * 3. 다운로드 버튼 클릭 시 최종 방어 밸리데이션 게이트 함수
     */
    function downloadPremiumCard() {
        const workoutCount = typeof workoutState !== 'undefined' ? workoutState.filter(Boolean).length : 0;
        const proteinCount = typeof proteinState !== 'undefined' ? proteinState.filter(Boolean).length : 0;

        // 🚨 최종 철벽 차단: 미리보기를 보면서 우회 스크립트로 다운로드를 시도하더라도 개수가 안 맞으면 가차없이 튕겨냄
        if (workoutCount !== 16 || proteinCount !== 30) {
            alert(`⚠️ 다운로드 불가: 아직 30일 완주 미션을 완전히 완료하지 못했습니다!\n(현재 운동: ${workoutCount}/16회, 단백질: ${proteinCount}/30일)\n\n조건을 다 채우신 후 영광스러운 마스터 카드를 획득해 보세요! 🔥`);
            isPreviewActive = false;
            updatePremiumLockStatus(); // 화면 강제 리셋
            return; 
        }

        // 완전히 성공한 정식 유저만 캡처 모듈로 진입 가능
        console.log("인증 성공. 카드 다운로드를 시작합니다.");
        if (typeof downloadCardAlert === 'function') {
            downloadCardAlert('premiumCard', 'verve_30days_grand_complete_card.png');
        } else if (typeof captureAndDownload === 'function') {
            captureAndDownload('#premiumCard');
        }
    }

    // 잊지 마세요! 체크박스를 반전하는 함수인 toggleWorkout() 이나 toggleProtein()의 
    // 맨 마지막 줄에 `updatePremiumLockStatus();`를 꼭 추가해 주셔야 실시간 연동이 완료됩니다!
</script>
